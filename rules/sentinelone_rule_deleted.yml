# schema: https://scanner.dev/schema/scanner-detection-rule.v1.json
name: SentinelOne Rule Deleted
description: |-
  Detect when a rule is deleted in SentinelOne.
  This can indicate  potential defense evasion.
severity: Medium
query_text: |-
  @scnr.source_type:sentinelone
  activityType:3602
  | groupbycount(userId)
  | where @q.count > 0
time_range_s: 300
run_frequency_s: 60
event_sink_keys:
- medium_severity_alerts
tags:
- tactics.ta0005.defense_evasion
- techniques.t1070.indicator_removal_on_host
- source.sentinel-one
