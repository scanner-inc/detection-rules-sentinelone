# schema: https://scanner.dev/schema/scanner-detection-rule.v1.json
name: SentinelOne Process Memory Dumped Using ProcDump
description: |-
  Detect when ProcDump is used to dump process memory. Malicious actors
  have used ProcDump to dump process memory, in an attempt to extract
  credentials.
severity: High
query_text: |-
  @scnr.source_type:sentinelone
  tgt.process.name:procdump
  tgt.process.cmdline:'.dmp'
  | groupbycount(dataSource.name)
  | where @q.count > 0
time_range_s: 300
run_frequency_s: 60
event_sink_keys:
- high_severity_alerts
tags:
- tactics.ta0006.credential_access
- techniques.t1003.os_credential_dumping
- source.sentinel-one
