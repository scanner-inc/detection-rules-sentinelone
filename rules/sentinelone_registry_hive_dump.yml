# schema: https://scanner.dev/schema/scanner-detection-rule.v1.json
name: SentinelOne Registry Hive Dump
description: |-
  Detect when a registry hive is dumped. Command line utilities like
  reg.exe can be used to dump Security and/or SAM hives in an attempt
  to extract credentials.
enabled: true
severity: High
query_text: |-
  @scnr.source_type:sentinelone
  tgt.process.name:reg.exe
  tgt.process.cmdline:(save export)
  tgt.process.cmdline:HKLM
  tgt.process.cmdline:(security sam system)
  | groupbycount(dataSource.name)
  | where @q.count > 0
time_range_s: 300
run_frequency_s: 60
event_sink_keys:
- high_severity_alerts
tags:
- tactics.ta0006.credential_access
- techniques.t1003.os_credential_dumping
- source.sentinel-one
