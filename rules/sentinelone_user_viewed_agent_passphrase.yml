# schema: https://scanner.dev/schema/scanner-detection-rule.v1.json
name: SentinelOne User Viewed Agent's Passphrase
description: |-
  Detect when a user viewed an agent's passphrase in SentinelOne.
  This can indicate potential unauthorized access to credentials.
enabled: true
severity: Medium
query_text: |-
  %ingest.source_type:"sentinelone:activities"
  activityType:64
  | groupbycount(userId)
  | where @q.count > 0
time_range_s: 300
run_frequency_s: 60
event_sink_keys:
- medium_severity_alerts
tags:
- tactics.ta0006.credential_access
- techniques.t1555.credentials_from_password_stores
- source.sentinelone
