# schema: https://scanner.dev/schema/scanner-detection-rule.v1.json
name: SentinelOne Multiple Alerts on Same Host
description: |-
  Detect when multiple alerts are received from the same host in SentinelOne.
  This can indicate potential initial access or ongoing compromise.
severity: High
query_text: |-
  @scnr.source_type:sentinelone
  activityType:3608
  | groupbycount(data.computername)
  | where @q.count > 1
time_range_s: 300
run_frequency_s: 60
event_sink_keys:
- high_severity_alerts
tags:
- tactics.ta0001.initial_access
- techniques.t1190.exploit_public_facing_application
- source.sentinel-one
