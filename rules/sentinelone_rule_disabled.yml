# schema: https://scanner.dev/schema/scanner-detection-rule.v1.json
name: SentinelOne Rule Disabled
description: |-
  Detect when a rule is disabled in SentinelOne.
  This can indicate potential defense evasion.
enabled: true
severity: Medium
query_text: |-
  %ingest.source_type:sentinel-one
  activityType:3603
  | groupbycount(userId)
  | where @q.count > 0
time_range_s: 300
run_frequency_s: 60
event_sink_keys:
- medium_severity_alerts
tags:
- tactics.ta0005.defense_evasion
- techniques.t1070.indicator_removal_on_host
- source.sentinel-one
