# schema: https://scanner.dev/schema/scanner-detection-rule.v1.json
name: SentinelOne Admin Created
description: |-
  Detect when a new admin user is created in SentinelOne. This can
  indicate potential privilege escalation or unauthorized
  administrative account creation.
severity: Medium
query_text: |-
  @scnr.source_type:sentinelone
  activityType:23
  | groupbycount(userId)
  | where @q.count > 0
time_range_s: 300
run_frequency_s: 60
event_sink_keys:
- medium_severity_alerts
tags:
- tactics.ta0004.privilege_escalation
- techniques.t1078.valid_accounts
- source.sentinel-one
